config_version = 4

[orchestrator]
enabled = true
automatic_routing = true
state_dir = ".colay"
timezone = "Asia/Seoul"
max_parallel_workers = 1
default_timeout_minutes = 30
max_retries = 1
warning_threshold_percent = 30
handover_threshold_percent = 15
critical_reserve_percent = 15
require_review_from_difficulty = 7
minimum_progress = 0.05
daily_grace_minutes = 60
monthly_grace_minutes = 1440
forecast_alpha = 0.3
minimum_forecast_observations = 3

[orchestrator.redaction]
# Organization-specific identifiers are regexes, not literal credential values.
patterns = ["(?i)COMPANY-SECRET-[A-Z0-9_-]+"]

[orchestrator.providers.gemini]
enabled = true
executable = "gemini"
quota_period = "calendar_day"
quota_unit = "provider_defined"
quota_scope = "enterprise_primary"
# quota_units_per_work_unit = 1.0 # Administrator calibration; never inferred.
# ledger_units_per_execution = 1.0 # Only if one execution has a contract-defined unit cost.
# quota_limit = 2000 # Set only to the administrator-confirmed Enterprise contract value.
reset_timezone = "Asia/Seoul"
priority = 70

[orchestrator.providers.codex]
enabled = true
executable = "codex"
quota_period = "calendar_month"
quota_unit = "provider_defined"
quota_scope = "enterprise_primary"
# quota_units_per_work_unit = 1.0
# ledger_units_per_execution = 1.0
# quota_limit = 1000 # Example only; do not infer a contract limit.
reset_day = 1
reset_timezone = "Asia/Seoul"
priority = 100

[orchestrator.providers.claude]
enabled = true
executable = "claude"
quota_period = "calendar_month"
quota_unit = "provider_defined"
quota_scope = "enterprise_primary"
# quota_units_per_work_unit = 1.0
# ledger_units_per_execution = 1.0
# quota_limit = 1000 # Example only; do not infer a contract limit.
reset_day = 1
reset_timezone = "Asia/Seoul"
priority = 90
effort_flag_enabled = false

[orchestrator.providers.gemini.usage_probe]
type = "manual_or_ledger"

[orchestrator.providers.codex.usage_probe]
type = "manual_or_ledger"

[orchestrator.providers.claude.usage_probe]
type = "manual_or_ledger"

# An administrator may replace one manual_or_ledger block with a structured,
# local probe. The executable and argv remain separate; no shell is used:
#
# [orchestrator.providers.gemini.usage_probe]
# type = "command"
# executable = "/company/bin/gemini-usage"
# args = ["--format", "json"]
# format = "json"

[orchestrator.model_profiles.codex.economy]
model = ""
effort = "low"

[orchestrator.model_profiles.codex.standard]
model = ""
effort = "medium"

[orchestrator.model_profiles.codex.premium]
model = ""
effort = "high"

[orchestrator.model_profiles.claude.economy]
model = "configured-by-enterprise-admin"
effort = "low"

[orchestrator.model_profiles.claude.standard]
model = "configured-by-enterprise-admin"
effort = "medium"

[orchestrator.model_profiles.claude.premium]
model = "configured-by-enterprise-admin"
effort = "high"

[orchestrator.model_profiles.gemini.economy]
model = "configured-by-enterprise-admin"

[orchestrator.model_profiles.gemini.standard]
model = "configured-by-enterprise-admin"

[orchestrator.model_profiles.gemini.premium]
model = "configured-by-enterprise-admin"

[features]
orchestrator = true
orchestrator_tui = true
codex_app_server_adapter = true
codex_exec_fallback = true
